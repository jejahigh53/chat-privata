<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Privata</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
    #login-box, #chat-box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 90%; max-width: 450px; }
    #chat-box { display: none; height: 80vh; flex-direction: column; }
    h2 { margin-top: 0; color: #1c1e21; }
    .input-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; }
    #messages { flex: 1; overflow-y: auto; list-style: none; padding: 10px; margin: 0 0 15px 0; border: 1px solid #e4e6eb; border-radius: 8px; background: #fafafa; }
    #messages li { margin-bottom: 12px; word-break: break-word; }
    .chat-img { max-width: 100%; max-height: 250px; border-radius: 8px; margin-top: 5px; display: block; }
    .input-area { display: flex; gap: 8px; align-items: center; }
    input[type="text"], input[type="password"] { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; outline: none; width: 100%; }
    input:focus { border-color: #0084ff; }
    button { padding: 12px 18px; background: #0084ff; color: white; border: none; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; }
    .btn-file { background: #e4e6eb; color: #333; padding: 12px 14px; border-radius: 6px; cursor: pointer; font-size: 16px; }
    .btn-file:hover { background: #d8dadf; }
    button:hover { background: #006bce; }
    #error-msg { color: #d93025; font-size: 14px; display: none; }
  </style>
</head>
<body>

  <!-- Accesso -->
  <div id="login-box">
    <h2>Accesso Chat Privata</h2>
    <div class="input-group">
      <input type="text" id="nickname-input" placeholder="Il tuo Nickname" onkeypress="handleLoginKey(event)">
      <input type="password" id="password-input" placeholder="Password d'accesso" onkeypress="handleLoginKey(event)">
      <div id="error-msg">Password errata! Riprova.</div>
      <button onclick="enterChat()" style="width: 100%;">Entra</button>
    </div>
  </div>

  <!-- Chat -->
  <div id="chat-box">
    <h2>Stanza Privata</h2>
    <ul id="messages"></ul>
    <div class="input-area">
      <!-- Pulsante allegato immagine -->
      <label class="btn-file" title="Invia Immagine">
        📎 <input type="file" id="image-input" accept="image/*" style="display: none;" onchange="sendImage(this)">
      </label>
      <input type="text" id="message-input" placeholder="Scrivi un messaggio..." onkeypress="if(event.key==='Enter') sendMessage()">
      <button onclick="sendMessage()">Invia</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let myNickname = '';

    function handleLoginKey(e) {
      if (e.key === 'Enter') {
        enterChat();
      }
    }

    function enterChat() {
      const nicknameInput = document.getElementById('nickname-input');
      const passwordInput = document.getElementById('password-input');
      const errorMsg = document.getElementById('error-msg');

      const nickname = nicknameInput.value.trim();
      const password = passwordInput.value.trim();

      errorMsg.style.display = 'none';

      if (!nickname) {
        alert('Inserisci un nickname!');
        return;
      }
      
      socket.emit('join', { nickname, password });
    }

    socket.on('login_success', (nickname) => {
      myNickname = nickname;
      document.getElementById('login-box').style.display = 'none';
      document.getElementById('chat-box').style.display = 'flex';
    });

    socket.on('login_error', () => {
      document.getElementById('error-msg').style.display = 'block';
    });

    function sendMessage() {
      const input = document.getElementById('message-input');
      if (input.value.trim() !== '') {
        socket.emit('chat message', { type: 'text', content: input.value });
        input.value = '';
      }
    }

    function sendImage(fileInput) {
      const file = fileInput.files[0];
      if (!file) return;

      if (file.size > 20 * 1024 * 1024) {
        alert('L\'immagine è troppo grande! Scegli un file sotto i 20MB.');
        fileInput.value = '';
        return;
      }

      const reader = new FileReader();
      reader.onload = function(evt) {
        socket.emit('chat message', { type: 'image', content: evt.target.result });
        fileInput.value = '';
      };
      reader.readAsDataURL(file);
    }

    socket.on('chat message', (data) => {
      const li = document.createElement('li');

      if (data.user === 'Sistema') {
        li.style.color = '#888';
        li.style.fontStyle = 'italic';
        li.textContent = data.text;
      } else {
        if (data.type === 'image') {
          li.innerHTML = `<strong>${data.user}:</strong><br><img src="${data.content}" class="chat-img" />`;
        } else {
          li.innerHTML = `<strong>${data.user}:</strong> ${data.content}`;
        }
      }

      document.getElementById('messages').appendChild(li);
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    });
  </script>
</body>
</html>
